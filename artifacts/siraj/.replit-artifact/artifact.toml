kind = "web"
previewPath = "/"
title = "سراج — Siraj Financial AI"
version = "1.0.0"
id = "artifacts/siraj"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20834

[services.development]
run = "pnpm --filter @workspace/siraj run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/siraj", "run", "build" ]
serve = "static"
publicDir = "artifacts/siraj/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20834"
BASE_PATH = "/"

[[services]]
name = "backend"
paths = [ "/api/v1" ]
localPort = 8001

[services.development]
run = "bash /home/runner/workspace/artifacts/siraj/start-backend.sh"

[services.env]
PORT = "8001"
